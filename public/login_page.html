<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Your Account</title>
    <style>
        /* Light/Dark Theme variables */
        :root {
            --background: #f8fafc;
            --container-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #cbd5e1;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --error: #ef4444;
            --error-bg: rgba(239, 68, 68, 0.1);
        }

        body.dark {
            --background: #0f172a;
            --container-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
        }

        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background: var(--background); 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px; 
            transition: background 0.3s ease, color 0.3s ease;
        }

        .form-container { 
            background: var(--container-bg); 
            padding: 2.5rem; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05); 
            width: 100%; 
            max-width: 420px; 
            position: relative;
            transition: background 0.3s ease;
        }

        /* Dark Mode Toggle Button */
        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 8px;
            border-radius: 50%;
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.2s ease;
        }
        
        .theme-toggle:hover {
            background: rgba(0, 0, 0, 0.05);
        }
        body.dark .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        h2 { 
            margin: 0 0 8px 0; 
            color: var(--text-main); 
            font-size: 24px;
            font-weight: 700;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .form-group { 
            margin-bottom: 18px; 
            position: relative;
        }

        label { 
            display: block; 
            margin-bottom: 6px; 
            font-weight: 600; 
            font-size: 14px;
            color: var(--text-main);
        }

        input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid var(--border); 
            background: var(--container-bg);
            border-radius: 6px; 
            box-sizing: border-box; 
            font-size: 15px;
            transition: all 0.2s ease;
            color: var(--text-main);
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
        }

        /* Error States */
        input.invalid {
            border-color: var(--error);
        }
        input.invalid:focus {
            box-shadow: 0 0 0 3px var(--error-bg);
        }

        .error-message {
            color: var(--error);
            font-size: 12px;
            margin-top: 5px;
            display: none;
            font-weight: 500;
        }

        input::placeholder {
            color: #94a3b8;
        }

        button[type="submit"] { 
            width: 100%; 
            padding: 12px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: 600;
            margin-top: 12px; 
            transition: background 0.2s ease;
        }

        button[type="submit"]:hover { 
            background: var(--primary-hover); 
        }

        .form-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .form-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .form-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="form-container">
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">🌙</button>
    
    <h2>Create Account</h2>
    <p class="subtitle">Please fill in the details to set up your profile.</p>
    
    <form action="/register" method="POST" id="registration-form">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="John Doe" required>
        </div>
        
        <div class="form-group">
            <label for="user_name">Username</label>
            <input type="text" id="user_name" name="user_name" placeholder="johndoe123" required>
        </div>
        
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>

        <div class="form-group">
            <label for="confirm_password">Confirm Password</label>
            <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" required>
            <div id="password-error" class="error-message">Passwords do not match</div>
        </div>
        
        <div class="form-group">
            <label for="teacher">Teacher</label>
            <input type="text" id="teacher" name="teacher" placeholder="Mr. Smith" required>
        </div>
        
        <div class="form-group">
            <label for="ttn_id">TTN ID</label>
            <input type="text" id="ttn_id" name="ttn_id" placeholder="Enter your TTN ID" required>
        </div>
        
        <div class="form-group">
            <label for="age">Age</label>
            <input type="number" id="age" name="age" min="0" max="120" placeholder="e.g. 16">
        </div>

        <button type="submit">Register</button> /<!-- email login verfication steup-->
    </form>

    <div class="form-footer">
        Already have an account? <a href="/login">Sign In</a>
    </div>
</div>

<script>
    // --- Dark Mode Logic ---
    const themeToggle = document.getElementById('theme-toggle');
    
    // Check local storage or system preferences for dark mode
    if (localStorage.getItem('theme') === 'dark' || 
        (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.body.classList.add('dark');
        themeToggle.textContent = '☀️';
    } else {
        themeToggle.textContent = '🌙';
    }

    themeToggle.addEventListener('click', () => {
        document.body.classList.toggle('dark');
        const isDark = document.body.classList.contains('dark');
        themeToggle.textContent = isDark ? '☀️' : '🌙';
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });

    // --- Password Match Validation Logic ---
    const password = document.getElementById('password');
    const confirmPassword = document.getElementById('confirm_password');
    const errorMsg = document.getElementById('password-error');

    function checkPasswords() {
        // If confirm field is empty, don't trigger error styling yet
        if (confirmPassword.value === '') {
            errorMsg.style.display = 'none';
            confirmPassword.classList.remove('invalid');
            confirmPassword.setCustomValidity('');
            return;
        }

        if (password.value !== confirmPassword.value) {
            errorMsg.style.display = 'block';
            confirmPassword.classList.add('invalid');
            // This native method stops the HTML form from submitting
            confirmPassword.setCustomValidity('Passwords do not match');
        } else {
            errorMsg.style.display = 'none';
            confirmPassword.classList.remove('invalid');
            confirmPassword.setCustomValidity('');
        }
    }

    // Check on input so the user gets real-time dynamic feedback
    password.addEventListener('input', checkPasswords);
    confirmPassword.addEventListener('input', checkPasswords);
</script>

</body>
</html>
